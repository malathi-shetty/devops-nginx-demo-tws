<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beautiful Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* floating blobs */
body::before, body::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  filter: blur(80px);
  animation: float 8s infinite alternate ease-in-out;
}

body::after {
  top: 60%;
  left: 70%;
  animation-delay: 2s;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(-40px); }
}

/* glass card */
.container {
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.1);
  padding: 50px;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  text-align: center;
  color: white;
  max-width: 550px;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px);}
  to { opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #fff, #c2e9fb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

h2 {
  margin-top: 10px;
  font-weight: 300;
  opacity: 0.9;
}

.highlight {
  margin: 25px 0;
  font-size: 1.3rem;
  font-weight: 500;
  color: #ffd86b;
}

/* features */
.features {
  margin-top: 20px;
}

.feature {
  background: rgba(255,255,255,0.15);
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
  transition: 0.3s;
}

.feature:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.25);
}

/* button */
.btn {
  margin-top: 25px;
  display: inline-block;
  padding: 12px 25px;
  border-radius: 30px;
  background: linear-gradient(90deg, #ff9a9e, #fad0c4);
  color: #333;
  font-weight: bold;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* footer */
.footer {
  margin-top: 20px;
  font-size: 0.85rem;
  opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">
  <h1>Hello Dosto 👋</h1>
  <h2>Aapka Swagat hai</h2>

  <div class="highlight">🚀 Building something amazing!</div>

  <div class="features">
    <div class="feature">✅ Good feature - Fixed</div>
    <div class="feature">🔥 Adding coolest feature</div>
    <div class="feature">✨ Adding cool feature</div>
  </div>

  <a href="#" class="btn">Explore More</a>

  <div class="footer">
    This is my change from dev 💻
  </div>
</div>

</body>
</html>
